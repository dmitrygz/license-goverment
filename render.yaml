databases:
  - name: license-goverment-db
    plan: free
    databaseName: license_goverment
    user: license_goverment_user

services:
  - type: web
    name: license-goverment
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:server
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: license-goverment-db
          property: connectionString
